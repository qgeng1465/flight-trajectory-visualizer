<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全球航班与地理数据分析系统 - 研究员版</title>
  
  <script src="https://unpkg.com/three"></script>
  <script src="https://unpkg.com/globe.gl"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <style>
    body { margin: 0; padding: 0; overflow: hidden; background-color: #050505; font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif; }
    #ui-panel {
      position: absolute; top: 20px; left: 20px; z-index: 10;
      background: rgba(15, 15, 15, 0.9); padding: 20px; border-radius: 8px;
      color: #eee; border: 1px solid #333; backdrop-filter: blur(10px); width: 320px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .control-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 6px; font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1px;}
    select, input, button {
      box-sizing: border-box; width: 100%; background: #222; color: #fff; 
      border: 1px solid #444; padding: 8px; border-radius: 4px; cursor: pointer; font-size: 13px;
    }
    button:hover { background: #333; border-color: #00ff88; }
    h3 { margin-top: 0; font-size: 16px; border-bottom: 1px solid #333; padding-bottom: 10px; color: #00ff88; }
    #stats { margin-top: 15px; font-size: 12px; color: #ffb86c; font-family: monospace; line-height: 1.6; }
    .lang-btn-group { display: flex; gap: 5px; }
    .active-lang { border-color: #00ff88 !important; color: #00ff88 !important; }
    .loader { color: #00ff88; font-style: italic; }
  </style>
</head>
<body>

  <div id="ui-panel">
    <h3 id="ui-title">系统控制中心</h3>
    
    <div class="control-group">
      <label id="label-lang">系统语言 / Language</label>
      <div class="lang-btn-group">
        <button id="btn-zh" class="active-lang" onclick="switchLang('zh')">中文模式</button>
        <button id="btn-en" onclick="switchLang('en')">English</button>
      </div>
    </div>

    <div class="control-group">
      <label id="label-file">导入轨迹数据 (CSV/Excel)</label>
      <input type="file" id="fileInput" accept=".csv" />
    </div>

    <div class="control-group">
      <label id="label-mode">轨迹动画模式</label>
      <select id="animToggle">
        <option value="dynamic">动态飞行 (Dynamic)</option>
        <option value="static">静态路径 (Static)</option>
      </select>
    </div>

    <button id="clearBtn" style="color: #ff5555; border-color: #622;">清除所有数据</button>
    
    <div id="stats"><span class="loader">正在加载本地数据库...</span></div>
  </div>

  <div id="globeViz"></div>

  <script>
    // --- 国际化配置 ---
    const i18n = {
      zh: { title: "全球数据分析系统", lang: "系统语言", file: "导入轨迹数据 (CSV)", mode: "轨迹动画模式", clear: "清除所有数据", alt: "高度", nodes: "节点", prov: "省界", active: "已激活", hidden: "远景隐藏" },
      en: { title: "Global Intelligence", lang: "System Language", file: "Import Flight Data", mode: "Animation Mode", clear: "Clear All Data", alt: "Altitude", nodes: "Nodes", prov: "Borders", active: "Active", hidden: "Hidden" }
    };

    let currentLang = 'zh';
    let airportDB = {}, geoLabelData = [], flightData = [], provinceData = [];

    // --- 初始化 WebGL 地球 ---
    const globe = Globe()(document.getElementById('globeViz'))
      .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-dark.jpg')
      .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
      .pointOfView({ alt: 2.5 })
      .arcColor(() => '#00ff88')
      .arcDashLength(0.4).arcDashGap(0.2).arcDashAnimateTime(2000)
      .polygonSideColor(() => 'rgba(0,0,0,0)')
      .polygonCapColor(() => 'rgba(0, 255, 136, 0.04)')
      .polygonStrokeColor(() => '#444')
      .polygonStrokeWidth(0.5)
      .polygonLabel(d => `
        <div style="padding:8px; background:rgba(0,0,0,0.9); border:1px solid #00ff88; color:#fff;">
          <b>${currentLang === 'zh' ? (d.properties.name_zh || d.properties.name) : (d.properties.name || d.properties.name_en)}</b><br/>
          <span style="font-size:11px; color:#aaa;">Country: ${d.properties.adm0_name}</span>
        </div>
      `);

    // --- 语言切换逻辑 ---
    function switchLang(lang) {
      currentLang = lang;
      const dict = i18n[lang];
      document.getElementById('ui-title').innerText = dict.title;
      document.getElementById('label-lang').innerText = dict.lang;
      document.getElementById('label-file').innerText = dict.file;
      document.getElementById('label-mode').innerText = dict.mode;
      document.getElementById('clearBtn').innerText = dict.clear;
      document.getElementById('btn-zh').className = (lang === 'zh' ? 'active-lang' : '');
      document.getElementById('btn-en').className = (lang === 'en' ? 'active-lang' : '');
      updateLOD(); // 刷新地图标签语言
    }

    // --- 核心：按需加载与性能控制 (LOD) ---
    function updateLOD() {
      const { alt } = globe.pointOfView();
      const statsEl = document.getElementById('stats');
      
      // 1. 省界逻辑：放大到 1.5 倍以下才渲染复杂的 Polygon 几何体
      if (alt < 1.6 && provinceData.length > 0) {
        globe.polygonsData(provinceData);
      } else {
        globe.polygonsData([]);
      }

      // 2. 标签抽样：高空只看主要枢纽，低空全量显示
      const sampledLabels = alt < 1.3 ? geoLabelData : geoLabelData.filter((_, i) => i % 25 === 0);
      globe.labelsData(sampledLabels)
        .labelText(d => currentLang === 'zh' ? d.zh : d.en)
        .labelSize(alt * 0.15)
        .labelDotRadius(0.08);

      // 3. 更新统计
      const dict = i18n[currentLang];
      statsEl.innerHTML = `
        ${dict.alt}: ${alt.toFixed(2)} | ${dict.nodes}: ${sampledLabels.length}<br>
        ${dict.prov}: ${alt < 1.6 ? dict.active : dict.hidden}
      `;
    }

    // --- 本地文件异步读取 ---
    async function loadLocalResources() {
      // 读取机场 CSV
      Papa.parse("./airports.csv", {
        download: true, header: true, skipEmptyLines: true,
        complete: (res) => {
          res.data.forEach(r => {
            if (r.iata_code && (r.type.includes('airport'))) {
              const iata = r.iata_code.toUpperCase();
              const entry = { iata, zh: r.municipality || r.name, en: r.name, lat: +r.latitude_deg, lng: +r.longitude_deg };
              airportDB[iata] = entry;
              geoLabelData.push(entry);
            }
          });
          updateLOD();
        }
      });

      // 读取省界 JSON
      fetch("./provinces.json")
        .then(res => res.json())
        .then(data => { 
          provinceData = data.features;
          console.log("Province data synced.");
        })
        .catch(err => console.error("JSON Error: 请检查 provinces.json 是否在同一目录并启动了本地服务器"));
    }

    // --- 交互监听 ---
    globe.onZoom(updateLOD);

    document.getElementById('fileInput').onchange = (e) => {
      const file = e.target.files[0];
      Papa.parse(file, { header: true, complete: (res) => {
        const enriched = res.data.map(r => {
          const s = airportDB[String(r.origin || '').toUpperCase().trim()];
          const e = airportDB[String(r.dest || '').toUpperCase().trim()];
          return s && e ? { startLat: s.lat, startLng: s.lng, endLat: e.lat, endLng: e.lng } : null;
        }).filter(x => x);
        flightData = [...flightData, ...enriched];
        globe.arcsData(flightData);
      }});
    };

    document.getElementById('animToggle').onchange = (e) => {
      const isDyn = e.target.value === 'dynamic';
      globe.arcDashLength(isDyn ? 0.4 : 1).arcDashAnimateTime(isDyn ? 2000 : 0);
    };

    document.getElementById('clearBtn').onclick = () => { flightData = []; globe.arcsData([]); };

    // 启动系统
    loadLocalResources();
    switchLang('zh');
  </script>
</body>
</html>
