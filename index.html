<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Global Geo-Analysis System Pro</title>
    <script src="https://unpkg.com/three"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://unpkg.com/topojson-client"></script>
    <style>
        body { margin: 0; background: #000; color: #eee; font-family: system-ui; overflow: hidden; }
        #ui { position: absolute; top: 15px; left: 15px; z-index: 10; background: rgba(10,10,10,0.85); padding: 18px; border-radius: 12px; width: 290px; border: 1px solid #333; backdrop-filter: blur(8px); }
        h3 { margin: 0 0 12px; color: #00ff88; font-size: 16px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .group { margin-bottom: 12px; }
        label { display: block; font-size: 10px; color: #777; margin-bottom: 4px; text-transform: uppercase; }
        input, select, button { width: 100%; background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 8px; border-radius: 6px; font-size: 13px; box-sizing: border-box; }
        button { cursor: pointer; transition: 0.2s; background: #222; }
        button:hover { border-color: #00ff88; background: #2a2a2a; }
        #stats { font-size: 11px; color: #ffb86c; margin-top: 10px; font-family: monospace; }
        .flex { display: flex; gap: 4px; margin-bottom: 8px; }
        .active { border-color: #00ff88; color: #00ff88; }
    </style>
</head>
<body>
    <div id="ui">
        <h3 id="t-title">地理智能分析系统</h3>
        <div class="flex">
            <button id="b-zh" class="active" onclick="switchLang('zh')">中文</button>
            <button id="b-en" onclick="switchLang('en')">EN</button>
        </div>
        <div class="group">
            <label id="l-search">定位查询 (IATA / 省名)</label>
            <input type="text" id="src" placeholder="PEK / Guangdong..." onkeydown="if(e=event,e.keyCode==13)find()">
        </div>
        <div class="group">
            <label id="l-file">数据导入 (.csv)</label>
            <input type="file" id="fIn" accept=".csv">
        </div>
        <div class="group">
            <select id="vMode">
                <option value="all">全部显示 (All)</option>
                <option value="arc">仅轨迹 (Arcs)</option>
                <option value="hub">仅热力 (Hubs)</option>
            </select>
        </div>
        <button onclick="clearAll()" style="color:#ff5555;font-size:11px">清除全部数据</button>
        <div id="stats">系统加载中...</div>
    </div>
    <div id="globe"></div>

    <script>
        const i18n = {
            zh: { title: "地理智能分析系统", search: "定位查询 (IATA / 省名)", file: "数据导入 (.csv)", ready: "就绪", loading: "同步中...", error: "未找到目标" },
            en: { title: "Geo-Intelligence Sys", search: "Locate (IATA / Prov)", file: "Import Data (.csv)", ready: "Ready", loading: "Syncing...", error: "Not Found" }
        };

        let db = {}, provs = [], arcs = [], hubs = [], lang = 'zh';

        // 初始化渲染器
        const world = Globe()(document.getElementById('globe'))
            .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-dark.jpg')
            .pointOfView({ alt: 2.5 })
            .arcColor(() => '#00ff88').arcDashLength(0.4).arcDashGap(0.2).arcDashAnimateTime(2000)
            .pointColor(() => '#ffff00').pointRadius(0.5).pointAltitude(d => Math.min(d.v * 0.01, 0.5))
            .polygonCapColor(() => 'rgba(0, 255, 136, 0.05)').polygonStrokeColor(() => '#444')
            .polygonLabel(d => `<b>${lang==='zh'?(d.properties.name_zh||d.properties.name):d.properties.name}</b>`);

        // 核心定位功能
        function find() {
            const q = document.getElementById('src').value.trim().toUpperCase();
            if (db[q]) return world.pointOfView({ lat: db[q].lt, lng: db[q].lg, alt: 0.8 }, 1500);
            const p = provs.find(x => (x.properties.name||'').toUpperCase()===q || (x.properties.name_zh||'').toUpperCase()===q);
            if (p) {
                const c = p.geometry.coordinates[0][0];
                world.pointOfView({ lat: Array.isArray(c[0])?c[0][1]:c[1], lng: Array.isArray(c[0])?c[0][0]:c[0], alt: 1.2 }, 1500);
            } else alert(i18n[lang].error);
        }

        // 高效数据加载
        async function init() {
            Papa.parse("./airports.csv", { download: true, header: true, complete: r => {
                r.data.forEach(x => { if(x.iata_code) db[x.iata_code.toUpperCase()] = { n: x.name, lt: +x.latitude_deg, lg: +x.longitude_deg }; });
            }});
            try {
                const r = await fetch("./provinces.json");
                const tj = await r.json();
                provs = topojson.feature(tj, tj.objects.ne_10m_admin_1_states_provinces).features;
                upd();
            } catch(e) { document.getElementById('stats').innerText="Error loading JSON"; }
        }

        function upd() {
            const { alt } = world.pointOfView();
            world.polygonsData(alt < 1.6 ? provs : []);
            document.getElementById('stats').innerText = `${i18n[lang].ready} | Alt: ${alt.toFixed(2)}`;
        }

        function switchLang(l) {
            lang = l;
            ['zh', 'en'].forEach(k => document.getElementById(`b-${k}`).className = l===k?'active':'');
            document.getElementById('t-title').innerText = i18n[l].title;
            document.getElementById('l-search').innerText = i18n[l].search;
            document.getElementById('l-file').innerText = i18n[l].file;
            world.polygonLabel(world.polygonLabel());
        }

        document.getElementById('fIn').onchange = e => {
            Papa.parse(e.target.files[0], { header: true, complete: r => {
                const counts = {};
                arcs = r.data.map(x => {
                    const s = db[(x.origin||'').toUpperCase()], d = db[(x.dest||'').toUpperCase()];
                    if (s && d) {
                        [x.origin, x.dest].forEach(i => {
                            const c = i.toUpperCase();
                            counts[c] = (counts[c]||0) + 1;
                        });
                        return { startLat: s.lt, startLng: s.lg, endLat: d.lt, endLng: d.lg };
                    }
                }).filter(x => x);
                hubs = Object.entries(counts).map(([k, v]) => ({ ...db[k], iata: k, v }));
                renderLayers();
            }});
        };

        function renderLayers() {
            const v = document.getElementById('vMode').value;
            world.arcsData(v==='hub'?[]:arcs).pointsData(v==='arc'?[]:hubs);
        }

        function clearAll() { world.arcsData([]).pointsData([]); document.getElementById('fIn').value=''; }

        document.getElementById('vMode').onchange = renderLayers;
        world.onZoom(upd);
        init();
        switchLang('zh');
    </script>
</body>
</html>
