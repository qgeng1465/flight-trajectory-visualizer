<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Global Spatial Data Visualization</title>
    
    <script src="https://unpkg.com/three@0.147.0/build/three.min.js"></script>
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
    
    <style>
        body { margin: 0; background: #000; color: #eee; font-family: -apple-system, system-ui; overflow: hidden; }
        #ui { position: absolute; top: 15px; left: 15px; z-index: 10; background: rgba(10,10,10,0.9); padding: 18px; border-radius: 8px; width: 300px; border: 1px solid #333; box-shadow: 0 4px 15px rgba(0,0,0,0.7); }
        h3 { margin: 0 0 12px; color: #00ff88; font-size: 16px; border-bottom: 1px solid #222; padding-bottom: 8px; }
        .group { margin-bottom: 10px; }
        label { display: block; font-size: 11px; color: #aaa; margin-bottom: 4px; text-transform: uppercase; font-weight: bold; }
        input, select, button { width: 100%; background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 8px; border-radius: 4px; font-size: 13px; box-sizing: border-box; }
        button { cursor: pointer; transition: border-color 0.2s; margin-top: 5px; }
        button:hover { border-color: #00ff88; }
        #stats { font-size: 11px; color: #ffb86c; margin-top: 10px; font-family: monospace; white-space: pre-wrap; line-height: 1.5; }
        .active { border-color: #00ff88; color: #00ff88; }
        .flex { display: flex; gap: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="ui">
        <h3 id="ui-title">地理空间智能分析系统</h3>
        <div class="flex">
            <button id="b-zh" class="active" onclick="switchLang('zh')">中文</button>
            <button id="b-en" onclick="switchLang('en')">EN</button>
        </div>
        
        <div class="group">
            <label id="l-search">空间定位检索 (IATA / 省名)</label>
            <input type="text" id="src" placeholder="输入并按 Enter 执行定位..." onkeydown="if(event.keyCode==13)find()">
        </div>

        <div class="group">
            <label id="l-file">导入高通量轨迹阵列 (.csv)</label>
            <input type="file" id="fIn" accept=".csv">
        </div>
        
        <div class="group">
            <label id="l-view">多维度图层控制</label>
            <select id="vMode" onchange="renderLayers()">
                <option value="all" id="opt-all">全维度渲染 (轨迹 + 核心枢纽)</option>
                <option value="arc" id="opt-arc">仅拓扑连线 (Arcs Only)</option>
                <option value="hub" id="opt-hub">仅热力散点 (Hubs Only)</option>
            </select>
        </div>

        <div class="group">
            <label id="l-rotate">空间旋转角速度 (ω)</label>
            <select id="rSpeed" onchange="setRotation()">
                <option value="4.0" id="opt-r15">15秒/转 (高频演示模式)</option>
                <option value="2.0" id="opt-r30">30秒/转 (标准模式)</option>
                <option value="1.0" id="opt-r60">60秒/转 (平滑分析模式)</option>
                <option value="0.000694" id="opt-rDay">真实地球同步自转</option>
                <option value="0" id="opt-rOff">锁定视角 (ω=0)</option>
            </select>
        </div>

        <div class="flex" style="margin-top: 15px;">
            <button onclick="exportSnapshot()">📸 导出渲染快照</button>
            <button onclick="clearAll()" style="color:#ff5555; border-color:#422;">清除缓存</button>
        </div>
        
        <div id="stats">系统内核启动中...</div>
    </div>
    
    <div id="globeViz"></div>

    <script>
        let db = {}, provs = [], arcs = [], hubs = [], lang = 'zh';
        let largeCities = [], allCities = []; 
        let airportsReady = false, provincesReady = false;

        const i18n = {
            zh: { 
                title: "地理空间智能分析系统", search: "空间定位检索 (IATA / 省名)", file: "导入高通量轨迹阵列 (.csv)", view: "多维度图层控制", rotate: "空间旋转角速度 (ω)",
                all: "全维度渲染 (轨迹 + 核心枢纽)", arc: "仅拓扑连线 (Arcs Only)", hub: "仅热力散点 (Hubs Only)",
                r15: "15秒/转 (高频演示模式)", r30: "30秒/转 (标准模式)", r60: "60秒/转 (平滑分析模式)", rDay: "真实地球同步自转", rOff: "锁定视角 (ω=0)",
                notfound: "目标坐标系未命中" 
            },
            en: { 
                title: "Spatial Data Analysis System", search: "Spatial Locate (IATA / Prov)", file: "Import Trajectory Array (.csv)", view: "Multi-dimensional Layers", rotate: "Angular Velocity (ω)",
                all: "Full Dimensions (Arcs + Hubs)", arc: "Topology Arcs Only", hub: "Heatmap Scatter Only",
                r15: "15s/rev (High-freq)", r30: "30s/rev (Standard)", r60: "60s/rev (Smooth)", rDay: "Real Earth Sync", rOff: "Lock View (ω=0)",
                notfound: "Target coordinates unmapped" 
            }
        };

        // ==========================================
        // 1. 初始化 WebGL 三维渲染管线 (拆解链式调用以确保安全)
        // ==========================================
        const world = Globe()(document.getElementById('globeViz'));

        // 基础贴图与视角
        world.globeImageUrl('./earth-dark.jpg') 
             .bumpImageUrl('./earth-topology.jpg')
             .pointOfView({ alt: 2.5 });

        // 轨迹属性配置
        world.arcColor(() => '#00ff88')
             .arcDashLength(0.4)
             .arcDashGap(0.2)
             .arcDashAnimateTime(2000);

        // 散点热力柱属性配置
        world.pointAltitude(d => Math.min(d.v * 0.01, 0.5))
             .pointColor(() => '#ffff00')
             .pointRadius(0.5);

        // 多边形省界属性配置
        world.polygonCapColor(() => 'rgba(0, 255, 136, 0.05)')
             .polygonStrokeColor(() => '#444')
             .polygonLabel(d => `<b>${lang==='zh'?(d.properties.name_zh||d.properties.name):d.properties.name}</b>`);

        // 城市标签属性配置
        world.labelLat(d => d.lt)
             .labelLng(d => d.lg)
             .labelText(d => d.iata)
             .labelDotRadius(d => d.isLarge ? 0.08 : 0.04)
             .labelColor(d => d.isLarge ? '#ffffff' : '#aaaaaa');

        window.addEventListener('resize', () => { world.width(window.innerWidth).height(window.innerHeight); });

        // ==========================================
        // 2. 异步并行加载管线
        // ==========================================
        async function init() {
            const stats = document.getElementById('stats');
            
            // 加载机场数据
            Papa.parse("./optimized_airports.csv", {
                download: true, header: true, skipEmptyLines: true,
                error: (err) => { 
                    stats.innerHTML = `<span style="color:red">错误: optimized_airports.csv 读取失败。<br>请检查文件名或文件是否存在。</span>`; 
                    console.error(err);
                },
                complete: r => {
                    r.data.forEach(x => { 
                        if(x.iata_code && (x.type === 'large_airport' || x.type === 'medium_airport')) { 
                            const item = { iata: x.iata_code.toUpperCase(), lt: +x.latitude_deg, lg: +x.longitude_deg, isLarge: x.type === 'large_airport' };
                            db[item.iata] = item;
                            allCities.push(item);
                            if(item.isLarge) largeCities.push(item);
                        } 
                    });
                    airportsReady = true;
                    upd(); 
                }
            });

            // 加载省界数据
            fetch("./provinces.json")
                .then(res => { if(!res.ok) throw new Error("JSON Fetch Failed"); return res.json(); })
                .then(tj => {
                    const objKey = Object.keys(tj.objects)[0];
                    provs = (tj.type === "Topology") ? topojson.feature(tj, tj.objects[objKey]).features : tj.features;
                    provincesReady = true;
                    stats.innerText = "系统就绪: LOD渲染引擎已激活。\n本地数据加载完成。";
                    upd(); 
                })
                .catch(e => { 
                    stats.innerHTML = `<span style="color:red">错误: provinces.json 加载失败。<br>请确认文件存在且格式正确。</span>`; 
                    console.error(e);
                });
        }

        // ==========================================
        // 3. 核心功能逻辑
        // ==========================================
        function upd() {
            const { alt } = world.pointOfView();
            if (airportsReady) {
                if (alt > 2.0) { world.labelsData([]); }
                else if (alt > 0.8) { world.labelsData(largeCities); world.labelSize(alt * 0.12); }
                else { world.labelsData(allCities); world.labelSize(alt * 0.08); }
            }
            if (provincesReady) { world.polygonsData(alt < 1.6 ? provs : []); }
        }

        function find() {
            const q = document.getElementById('src').value.trim().toUpperCase();
            if (db[q]) return world.pointOfView({ lat: db[q].lt, lng: db[q].lg, alt: 0.5 }, 1500);
            const p = provs.find(x => (x.properties.name||'').toUpperCase()===q || (x.properties.name_zh||'').toUpperCase()===q);
            if (p) {
                const c = p.geometry.coordinates[0][0];
                world.pointOfView({ lat: Array.isArray(c[0])?c[0][1]:c[1], lng: Array.isArray(c[0])?c[0][0]:c[0], alt: 1.2 }, 1500);
            } else alert(i18n[lang].notfound);
        }

        document.getElementById('fIn').onchange = e => {
            if (!e.target.files[0]) return;
            Papa.parse(e.target.files[0], { header: true, complete: r => {
                const counts = {};
                arcs = r.data.map(x => {
                    const s = db[(x.origin||'').trim().toUpperCase()], d = db[(x.dest||'').trim().toUpperCase()];
                    if (s && d) {
                        [x.origin, x.dest].forEach(i => { const c = i.trim().toUpperCase(); counts[c] = (counts[c]||0) + 1; });
                        return { startLat: s.lt, startLng: s.lg, endLat: d.lt, endLng: d.lg };
                    }
                }).filter(x => x);
                hubs = Object.entries(counts).map(([k, v]) => ({ ...db[k], iata: k, v }));
                renderLayers();
            }});
        };

        function renderLayers() {
            const v = document.getElementById('vMode').value;
            world.arcsData(v==='hub'?[]:arcs).pointsData(v==='arc'?[]:hubs);
        }

        function clearAll() { world.arcsData([]).pointsData([]); document.getElementById('fIn').value=''; }

        function exportSnapshot() {
            world.renderer().render(world.scene(), world.camera());
            const a = document.createElement('a');
            a.href = world.renderer().domElement.toDataURL('image/png');
            a.download = `Spatial_Snapshot_${new Date().getTime()}.png`;
            a.click();
        }

        function setRotation() {
            const val = parseFloat(document.getElementById('rSpeed').value);
            world.controls().autoRotate = (val > 0);
            if (val > 0) world.controls().autoRotateSpeed = val;
        }

        function switchLang(l) {
            lang = l;
            ['zh', 'en'].forEach(k => document.getElementById(`b-${k}`).className = l===k?'active':'');
            document.getElementById('ui-title').innerText = i18n[l].title;
            ['search', 'file', 'view', 'rotate'].forEach(k => document.getElementById(`l-${k}`).innerText = i18n[l][k]);
            ['all', 'arc', 'hub', 'r15', 'r30', 'r60', 'rDay', 'rOff'].forEach(k => document.getElementById(`opt-${k}`).innerText = i18n[l][k]);
            world.polygonLabel(world.polygonLabel());
        }

        // ==========================================
        // 4. 启动引擎
        // ==========================================
        world.onZoom(upd);
        init();
        setRotation(); 
    </script>
</body>
</html>
